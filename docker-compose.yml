services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_KEY: base64:WQBYBX+D5623Lu5ic+xgcV7QdrcAnId3FbEWKG0GuAQ=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: afisha
      DB_USERNAME: afisha
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
    working_dir: /var/www

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: afisha
      MYSQL_USER: afisha
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
